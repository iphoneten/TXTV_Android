<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #FFFFFF; /* White background */
            font-family: Arial, sans-serif;
        }
        .error-container {
            text-align: center;
            color: #000000; /* Black text */
            background-color: #FFFFFF; /* White background for container */
            padding: 20px;
            border-radius: 10px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            font-size: 16px;
        }
    </style>
</head>
<body>
<div class="error-container">
    <h1>加载失败</h1>
    <p>试试下拉刷新重新加载</p>
</div>
</body>
</html>
